# PO0 防火墙白名单（Quantumult X）
#
# 使用前请将下方四个脚本 URL 中 # 后的示例参数替换为实际值：
#   host              API 主机，默认 124.221.69.228，不要包含路径
#   cellular_tokens   蜂窝网络 token@slot_id，多个使用 | 分隔
#   wifi_tokens       Wi-Fi、有线等非蜂窝网络 token@slot_id，多个使用 | 分隔
#   skip_ssids        自动任务需要跳过的 Wi-Fi SSID，多个使用 | 分隔
#
# cellular_tokens 与 wifi_tokens 至少填写一组。若参数值含有 &、= 等字符，请先进行 URL 编码。
# 手动更新会忽略 skip_ssids；“查看状态”只读取上一次请求结果，不调用 API。
# event-network、定时任务和交互任务均要求 Quantumult X Tunnel 正在运行。
# Quantumult X 使用 $environment.cellular 作为蜂窝正向信号；有线网络的本地 IP 标识归为非蜂窝。

[task_local]
# 网络变化时更新。Quantumult X 原生事件为 event-network。
event-network https://raw.githubusercontent.com/alecthw/chnlist/main/po0w/quanx/po0w.js#mode=update&trigger=event&host=124.221.69.228&cellular_tokens=token1@3|token2@4&wifi_tokens=token3@5&skip_ssids=Home|Office, tag=PO0W 网络变化, enabled=true

# 每 30 分钟定时兜底。
*/30 * * * * https://raw.githubusercontent.com/alecthw/chnlist/main/po0w/quanx/po0w.js#mode=update&trigger=cron&host=124.221.69.228&cellular_tokens=token1@3|token2@4&wifi_tokens=token3@5&skip_ssids=Home|Office, tag=PO0W 定时更新, enabled=true

# 原生交互任务：强制使用当前网络对应的 Tokens，且忽略 skip_ssids。
event-interaction https://raw.githubusercontent.com/alecthw/chnlist/main/po0w/quanx/po0w.js#mode=manual&trigger=manual&host=124.221.69.228&cellular_tokens=token1@3|token2@4&wifi_tokens=token3@5&skip_ssids=Home|Office, tag=PO0W 手动更新, img-url=arrow.clockwise.system, enabled=true

# 原生交互任务：只查看共享缓存中的上一次结果。
event-interaction https://raw.githubusercontent.com/alecthw/chnlist/main/po0w/quanx/po0w.js#mode=status&trigger=status&host=124.221.69.228&cellular_tokens=token1@3|token2@4&wifi_tokens=token3@5&skip_ssids=Home|Office, tag=PO0W 查看状态, img-url=list.bullet.rectangle.system, enabled=true
