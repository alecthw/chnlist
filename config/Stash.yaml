rules:
  # Custom force
  - RULE-SET,CustomDirect,Domestic,no-resolve
  - RULE-SET,CustomProxy,Proxy,no-resolve
  - RULE-SET,Direct,Domestic,no-resolve
  - RULE-SET,CustomReject,AdBlock,no-resolve

  # Ban Ads
  - RULE-SET,AdvertisingLite,AdBlock,no-resolve
  - RULE-SET,AdvertisingLite_Domain,AdBlock,no-resolve

  # Apple
  - RULE-SET,Apple,Apple,no-resolve
  - RULE-SET,Apple_Domain,Apple,no-resolve

  # Download
  - RULE-SET,Download,Domestic,no-resolve
  - RULE-SET,GameDownloadCN,Domestic,no-resolve
  - RULE-SET,GameDownload,Domestic,no-resolve

  # APP
  - RULE-SET,Telegram,Telegram,no-resolve
  - RULE-SET,Speedtest,Speedtest,no-resolve
  - RULE-SET,PayPal,PayPal,no-resolve
  - RULE-SET,Crypto,Crypto,no-resolve
  - RULE-SET,Steam,Steam,no-resolve
  - RULE-SET,Epic,Epic,no-resolve
  - RULE-SET,UBI,Ubisoft,no-resolve
  - RULE-SET,Ubisoft,Ubisoft,no-resolve
  - RULE-SET,Xbox,Xbox,no-resolve
  - RULE-SET,Microsoft,Microsoft,no-resolve
  - RULE-SET,Google,Google,no-resolve
  - RULE-SET,LLMApiGlobal,LLMApiGlobal,no-resolve

  # China Media
  - RULE-SET,ChinaMedia,Domestic,no-resolve

  # Media
  - RULE-SET,TikTok,TikTok,no-resolve
  - RULE-SET,Disney,DisneyPlus,no-resolve
  - RULE-SET,Netflix,Netflix,no-resolve
  - RULE-SET,Spotify,Spotify,no-resolve
  - RULE-SET,AmazonPrimeVideo,GlobalMedia,no-resolve
  - RULE-SET,HBO,GlobalMedia,no-resolve
  - RULE-SET,GlobalMedia,GlobalMedia,no-resolve
  - RULE-SET,GlobalMedia_Domain,GlobalMedia,no-resolve

  # Force proxy
  - RULE-SET,ProxyLite,Proxy,no-resolve

  # Force china direct
  - RULE-SET,China,Domestic,no-resolve
  - RULE-SET,China_Domain,Domestic,no-resolve

  # Local network, should be resolve, so put it last
  - RULE-SET,Lan,DIRECT

  # CN, should be resolve
  - GEOIP,CN,Domestic

  # Final
  - MATCH,Final

