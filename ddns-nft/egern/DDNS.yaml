name: DDNS 动态域名解析
description: 支持阿里云 (aliyun) 和 DNSPod (dnspod) 的动态域名解析。网络变化时与每 30 分钟检测公网 IPv4 与 DNS A 记录，不一致时先匹配 /24 缓存，未命中才更新。
author: alecthw
homepage: https://github.com/alecthw/chnlist
icon: network

env_schema:
  provider:
    name: DDNS 服务商
    description: 可选值 aliyun 或 dnspod
    default_value: aliyun
    options:
      - aliyun
      - dnspod
  domain:
    name: 主域名
    description: 例如 example.com
    default_value: example.com
  rr:
    name: 主机记录
    description: 主机记录/子域名，根域名填 @
    default_value: mobile
  id:
    name: API ID
    description: 阿里云 AccessKeyId 或 DNSPod Token ID
  secret:
    name: API Secret
    description: 阿里云 AccessKeySecret 或 DNSPod Token
  skip_ssid:
    name: 跳过 SSID
    description: 可选，指定 Wi-Fi SSID 下跳过执行，多个 SSID 用竖线分隔
    default_value: Home|Office

scriptings:
  - network:
      name: DDNS 网络变化
      script_url: https://raw.githubusercontent.com/alecthw/chnlist/main/ddns-nft/egern/DDNS.js
      timeout: 30
      env:
        provider: aliyun
        domain: ''
        rr: mobile
        id: ''
        secret: ''
        skip_ssid: ''

  - schedule:
      name: DDNS 定时检测
      cron: "*/30 * * * *"
      script_url: https://raw.githubusercontent.com/alecthw/chnlist/main/ddns-nft/egern/DDNS.js
      timeout: 30
      env:
        provider: aliyun
        domain: ''
        rr: mobile
        id: ''
        secret: ''
        skip_ssid: ''

  - generic:
      name: DDNS 手动检查
      script_url: https://raw.githubusercontent.com/alecthw/chnlist/main/ddns-nft/egern/DDNS.js
      timeout: 30
      env:
        mode: manual
        provider: aliyun
        domain: ''
        rr: mobile
        id: ''
        secret: ''
        skip_ssid: ''

  - generic:
      name: DDNS 状态
      script_url: https://raw.githubusercontent.com/alecthw/chnlist/main/ddns-nft/egern/DDNS.js
      timeout: 30
      env:
        mode: panel
        provider: aliyun
        domain: ''
        rr: mobile
        id: ''
        secret: ''
        skip_ssid: ''

widgets:
  - name: DDNS 状态
    script_name: DDNS 状态
