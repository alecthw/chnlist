# DDNS 动态域名解析
# 支持阿里云 (aliyun) 和 DNSPod (dnspod)。
# Quantumult X 使用同一份 DDNS.js，通过兼容层适配 $task/$prefs/$notify。
# 请替换 argument 中的示例参数。

[task_local]
# 定时兜底检测，每 30 分钟一次
*/30 * * * * https://raw.githubusercontent.com/alecthw/chnlist/main/ddns-nft/DDNS.js, tag=DDNS 定时检测, argument=provider=aliyun&domain=example.com&rr=mobile&id=AccessKeyID/TokenID&secret=AccessKeySecret/TokenKey&skip_ssid=Home|Office, enabled=true

# 手动触发检查/更新
# Quantumult X 以 event-interaction 作为手动按钮；若 DNS 不匹配且缓存未命中才更新。
event-interaction https://raw.githubusercontent.com/alecthw/chnlist/main/ddns-nft/DDNS.js, tag=DDNS 手动检查, argument=mode=panel&provider=aliyun&domain=example.com&rr=mobile&id=AccessKeyID/TokenID&secret=AccessKeySecret/TokenKey&skip_ssid=Home|Office, enabled=true
