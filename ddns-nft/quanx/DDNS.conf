# DDNS 动态域名解析
# 支持阿里云 (aliyun) 和 DNSPod (dnspod)。
# Quantumult X 使用同一份 DDNS.js，通过兼容层适配 $task/$prefs/$notify。
# 请替换 argument 中的示例参数。

[task_local]
# 网络变化触发；Quantumult X 官方事件名为 event-network。
event-network https://raw.githubusercontent.com/alecthw/chnlist/main/ddns-nft/DDNS.js, tag=DDNS 网络变化, argument=provider=aliyun&domain=example.com&rr=mobile&id=AccessKeyID/TokenID&secret=AccessKeySecret/TokenKey&skip_ssid=Home|Office, enabled=true

# 定时兜底检测，每 30 分钟一次。
*/30 * * * * https://raw.githubusercontent.com/alecthw/chnlist/main/ddns-nft/DDNS.js, tag=DDNS 定时检测, argument=provider=aliyun&domain=example.com&rr=mobile&id=AccessKeyID/TokenID&secret=AccessKeySecret/TokenKey&skip_ssid=Home|Office, enabled=true

# 手动触发检查/更新；若 DNS 不匹配且缓存未命中才更新。
event-interaction https://raw.githubusercontent.com/alecthw/chnlist/main/ddns-nft/DDNS.js, tag=DDNS 手动检查, argument=mode=manual&provider=aliyun&domain=example.com&rr=mobile&id=AccessKeyID/TokenID&secret=AccessKeySecret/TokenKey&skip_ssid=Home|Office, enabled=true
